workflows:
  web-build:
    name: Web Build
    max_build_duration: 30
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: |
          cd gestura-frontend
          npm install
      - name: Build web app
        script: |
          cd gestura-frontend
          npm run build
    artifacts:
      - gestura-frontend/build/**
      - gestura-frontend/dist/**